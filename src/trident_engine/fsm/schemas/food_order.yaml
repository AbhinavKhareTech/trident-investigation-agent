# Food Order FSM Schema — Canonical workflow with compensation semantics
# Playbook v8.0 Parts 2, 16

states:
  - IDLE
  - ORDER_INITIATED
  - PAYMENT_AUTHORIZED
  - MERCHANT_CONFIRMED
  - DRIVER_ASSIGNED
  - DELIVERED
  - CLOSED
  - REFUND_INITIATED
  - FAILED

initial_state: IDLE

transitions:
  IDLE -> ORDER_INITIATED:
    condition: order_valid
    timeout: 60
    retry: 1

  ORDER_INITIATED -> PAYMENT_AUTHORIZED:
    condition: payment_processor_success
    timeout: 300
    retry: 2
    compensation: release_inventory_hold

  PAYMENT_AUTHORIZED -> MERCHANT_CONFIRMED:
    condition: merchant_api_acknowledgment
    timeout: 120
    retry: 3
    compensation: reverse_payment_authorization

  MERCHANT_CONFIRMED -> DRIVER_ASSIGNED:
    condition: driver_matched
    timeout: 600
    retry: 0
    compensation: cancel_merchant_order

  DRIVER_ASSIGNED -> DELIVERED:
    condition: delivery_confirmed
    timeout: 3600
    retry: 0

  DELIVERED -> CLOSED:
    condition: always_true
    timeout: 86400
    retry: 0

  CLOSED -> REFUND_INITIATED:
    condition: refund_eligible
    timeout: 604800
    retry: 1

  # Failure transitions (from any active state)
  ORDER_INITIATED -> FAILED:
    condition: always_true
    timeout: 0
    retry: 0

  PAYMENT_AUTHORIZED -> FAILED:
    condition: always_true
    timeout: 0
    retry: 0
    compensation: reverse_payment_authorization

  MERCHANT_CONFIRMED -> FAILED:
    condition: always_true
    timeout: 0
    retry: 0
    compensation: cancel_merchant_order

metadata:
  domain: food
  version: "1.0"
  description: "Swiggy Food order lifecycle"
